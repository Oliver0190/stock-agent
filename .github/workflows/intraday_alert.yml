name: Intraday Alert

on:
  schedule:
    # 港股交易时段 09:30-12:00, 13:00-16:00 HKT
    # = UTC 01:30-04:00, 05:00-08:00, 每 10 分钟
    - cron: "*/10 1-3 * * 1-5"
    - cron: "0,10,20,30,40,50 5-7 * * 1-5"
    - cron: "0 4 * * 1-5"
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run intraday alert
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TZ: Asia/Hong_Kong
          DATA_SOURCE: akshare
        run: python -m src.jobs intraday
